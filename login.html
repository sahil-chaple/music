<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>StreamWave · Account</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <!-- Animated Background -->
    <div class="background-animation">
      <div class="gradient-orb orb-1"></div>
      <div class="gradient-orb orb-2"></div>
      <div class="gradient-orb orb-3"></div>
      <div class="particles"></div>
    </div>

    <!-- Main Login/Signup Card -->
    <div class="login-card" id="authCard">
      <!-- Brand Section -->
      <div class="brand-section">
        <div class="logo-wrapper">
          <i class="fab fa-spotify logo-icon"></i>
          <span class="logo-text">StreamWave</span>
        </div>
        <p class="welcome-text" id="authTitle">Welcome back</p>
      </div>

      <!-- Toggle between Login and Signup -->
      <div class="auth-toggle">
        <button class="toggle-btn active" id="loginToggleBtn">Login</button>
        <button class="toggle-btn" id="signupToggleBtn">Sign Up</button>
      </div>

      <!-- Auth Form -->
      <form class="login-form" id="authForm">
        <!-- Name field (only for signup) -->
        <div class="input-group" id="nameGroup" style="display: none;">
          <div class="input-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input 
              type="text" 
              id="displayName" 
              class="form-input" 
              placeholder="Full name"
              autocomplete="name"
            >
            <span class="input-highlight"></span>
          </div>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="Email address"
              required
              autocomplete="email"
            >
            <span class="input-highlight"></span>
          </div>
        </div>

        <div class="input-group">
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="Password"
              required
              autocomplete="current-password"
            >
            <button type="button" class="toggle-password" id="togglePassword">
              <i class="fas fa-eye"></i>
            </button>
            <span class="input-highlight"></span>
          </div>
        </div>

        <!-- Additional Options (only for login) -->
        <div class="form-options" id="loginOptions">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark"></span>
            <span class="checkbox-label">Remember me</span>
          </label>
          <a href="#" class="forgot-link" id="forgotPasswordBtn">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="login-btn" id="submitBtn">
          <span class="btn-text" id="submitBtnText">Sign In</span>
          <i class="fas fa-arrow-right btn-icon"></i>
          <span class="btn-loader"></span>
        </button>

        <!-- Divider -->
        <div class="divider">
          <span class="divider-text">or continue with</span>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <button type="button" class="social-btn google-btn" id="googleLoginBtn">
            <i class="fab fa-google"></i>
            <span>Google</span>
          </button>
        </div>

        <!-- Toggle text -->
        <p class="signup-prompt" id="toggleText">
          Don't have an account? 
          <a href="#" class="signup-link" id="toggleAuthLink">Create account</a>
        </p>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <a href="#">Privacy</a>
      <span class="dot"></span>
      <a href="#">Terms</a>
      <span class="dot"></span>
      <a href="#">Help</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="login.js"></script>
</body>
</html>
